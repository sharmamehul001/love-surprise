<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Chat</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    #chat-container {
        background: white;
        padding: 20px;
        width: 350px;
        height: 500px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
    }
    #messages {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 10px;
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 5px;
        background: #fafafa;
    }
    .message {
        margin-bottom: 8px;
    }
    .message span {
        font-weight: bold;
    }
    #input-area {
        display: flex;
    }
    #input-area input {
        flex: 1;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ddd;
    }
    #input-area button {
        padding: 10px 15px;
        margin-left: 5px;
        border-radius: 5px;
        border: none;
        background: #007bff;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="chat-container">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('message-input');

    function sendMessage() {
        const text = input.value.trim();
        if(text === '') return;

        const messageEl = document.createElement('div');
        messageEl.classList.add('message');
        messageEl.innerHTML = `<span>You:</span> ${text}`;
        messagesDiv.appendChild(messageEl);

        // Auto reply from friend (simple simulation)
        setTimeout(() => {
            const replyEl = document.createElement('div');
            replyEl.classList.add('message');
            replyEl.innerHTML = `<span>Friend:</span> ${text.split('').reverse().join('')}`;
            messagesDiv.appendChild(replyEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, 500);

        input.value = '';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    input.addEventListener("keypress", function(e) {
        if(e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
