<!DOCTYPE html>
<html>
<head>
    <title>Special Surprise ❤️</title>
    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            text-align:center;
            background: linear-gradient(45deg,#ff9a9e,#fad0c4);
            overflow-x:hidden;
        }

        #countdown{
            font-size:60px;
            margin-top:20%;
            color:white;
        }

        #mainContent{
            display:none;
            padding:30px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            max-width:500px;
            margin:auto;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            border:none;
            border-radius:10px;
            background:#ff4b5c;
            color:white;
            cursor:pointer;
            margin-top:15px;
        }

        #letter{
            display:none;
            margin-top:20px;
            font-size:18px;
            color:#333;
        }

        .photos img{
            width:150px;
            margin:10px;
            border-radius:15px;
        }
    </style>
</head>

<body>

<div id="countdown">3</div>

<div id="mainContent">
    <div class="card">
        <h1❤️>i love you xxx❤️ </h1>

        <button onclick="showLetter()">Note For You 💌</button>

        <div id="letter">
            <p>
                Tum meri life ki sabse special person ho ❤️  
                Main bas yahi chahta hoon ki tum hamesha happy raho.  
                I love you so much 💖
            </p>
        </div>

        <div class="photos">
            <h3>Our Memories 📸</h3>
            <img src="photo1.jpg">
            <img src="photo2.jpg">
            <img src="photo3.jpg">
        </div>

    </div>
</div>

<audio id="song" src="birthday.mp3"></audio>

<script>
let count = 3;
let countdownEl = document.getElementById("countdown");
let mainContent = document.getElementById("mainContent");
let song = document.getElementById("song");

let interval = setInterval(function(){
    count--;
    if(count >= 0){
        countdownEl.innerHTML = count;
    }
    if(count < 0){
        clearInterval(interval);
        countdownEl.style.display = "none";
        mainContent.style.display = "block";
        song.play();
    }
},1000);

function showLetter(){
    document.getElementById("letter").style.display = "block";
    song.pause();
}
</script>

</body>
</html>
